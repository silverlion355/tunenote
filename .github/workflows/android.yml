name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: |
          cd app/frontend
          npm ci

      - name: Build web app
        run: |
          cd app/frontend
          npm run build

      - name: Sync Capacitor
        run: |
          cd app/frontend
          npx cap sync android

      - name: Build debug APK
        run: |
          cd app/frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        run: |
          curl --fail -T app/frontend/android/app/build/outputs/apk/debug/app-debug.apk \
            "https://transfer.sh/tunenote-$(date +%Y%m%d).apk" \
            --max-time 60 || echo "APK ready at: app/frontend/android/app/build/outputs/apk/debug/app-debug.apk"